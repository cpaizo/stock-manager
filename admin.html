<div id="admin-container" style="display:none;">
    <h2>新增交易紀錄</h2>
    <form id="admin-form">
        <select id="type">
            <option value="存錢">存錢</option>
            <option value="提錢">提錢</option>
            <option value="買入">買入</option>
            <option value="賣出">賣出</option>
        </select>
        <input type="number" id="amount" placeholder="金額" required>
        <textarea id="note" placeholder="備註"></textarea>
        <button type="submit">送出</button>
    </form>
</div>
